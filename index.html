<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Happy Birthday</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      overflow: hidden;
      background: linear-gradient(135deg, #57bfff, #2d6cdf);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: white;
    }

    .flower {
      position: absolute;
      font-size: 50px;
      opacity: 0.3;
      animation: float 6s infinite ease-in-out;
    }

    .flower:nth-child(1) {
      top: 10%;
      left: 10%;
    }

    .flower:nth-child(2) {
      top: 20%;
      right: 15%;
    }

    .flower:nth-child(3) {
      bottom: 15%;
      left: 20%;
    }

    .flower:nth-child(4) {
      bottom: 10%;
      right: 10%;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-20px); }
      100% { transform: translateY(0px); }
    }

    .card {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(12px);
      border-radius: 30px;
      padding: 40px;
      width: 90%;
      max-width: 700px;
      text-align: center;
      box-shadow: 0 8px 30px rgba(0,0,0,0.25);
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 20px;
    }

    p {
      font-size: 1.2rem;
      line-height: 1.8;
    }

    .button {
      margin-top: 25px;
      padding: 14px 28px;
      border: none;
      border-radius: 999px;
      background: white;
      color: #2d6cdf;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .button:hover {
      transform: scale(1.05);
    }

    details {
      margin-top: 25px;
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 20px;
    }

    summary {
      cursor: pointer;
      font-size: 1.1rem;
      font-weight: bold;
    }

    video {
      width: 100%;
      border-radius: 20px;
      margin-top: 20px;
    }

    .footer {
      margin-top: 30px;
      font-size: 1.3rem;
      color: #ffe5f3;
    }
  </style>
</head>

<body>

  <div class="flower">🌸</div>
  <div class="flower">🌼</div>
  <div class="flower">🌺</div>
  <div class="flower">🌷</div>

  <div class="card">
    <h1>Happy Birthday 💙</h1>

    <p>
      I hope your day is filled with happiness, laughter,
      peace, and beautiful memories.
    </p>

    <p>
      Thank you for being such an amazing person.
      You deserve all the good things in the world.
    </p>

    <button class="button"
      onclick="alert('🎉 I hope this year becomes your happiest one yet ✨')">
      Birthday Surprise ✨
    </button>

    <details>
      <summary>🌸 Secret Birthday Message 🌸</summary>

      <p>I left something special for you 💖</p>

      <video controls>
        <source src="birthday-message.mp4" type="video/mp4">
      </video>
    </details>

    <div class="footer">
      — From Someone Who Cares 💖
    </div>
  </div>

</body>
</html>
